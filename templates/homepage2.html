<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>mr_perfect_pandit</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
</head>
<body>
<h1>Enter text below to remove punctuations</h1>

<form action="/analized", method="get">
    <textarea name="form_data" style="margin: 0px; width: 1069px; height: 234px; color:red;"></textarea><hr><br>
    <input type =checkbox name="punc_check">remove puctuations<br>
    <input type =checkbox name="space_check">remove double space<br>
    <input type =checkbox name="line_check">remove new line<br>
    <input type =checkbox name="num_check">remove numbers<br>
    <input type =checkbox name="char_check">count characters<br>
    <input type="checkbox" name="upper_check">change whole text in uppercase<br>
    <button type="submit">analize my text now</button>
</form>

</body>
</html>
